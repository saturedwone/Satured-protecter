<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satured Anti</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #00aaff;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ===== SPLASH SCREEN ===== */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #splash h1 {
      font-size: 32px;
      text-align: center;
      color: #fff;
    }

    .loader {
      margin-top: 30px;
      width: 200px;
      height: 6px;
      background: #111;
      border-radius: 10px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: #00aaff;
      animation: load 2.5s forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }

    /* ===== MAIN CONTENT ===== */
    .container {
      width: 90%;
      max-width: 500px;
      margin: 80px auto;
      text-align: center;
      display: none;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: #111;
      border: 1px solid #00aaff;
      color: #00aaff;
      padding: 10px;
      border-radius: 8px;
      resize: none;
      box-sizing: border-box;
    }

    button.generate-btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #00aaff;
      border: none;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button.generate-btn:hover {
      background: #0088cc;
    }

    /* Sección inferior (Satured Hub + Discord) */
    .footer-section {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #222;
      color: #fff;
    }

    .footer-section p {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    /* Botón de Discord */
    .discord-btn {
      background: #5865F2; /* Azul oficial de Discord */
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      box-sizing: border-box;
    }

    .discord-btn:hover {
      background: #4752C4;
    }

    .discord-btn svg {
      width: 24px;
      height: 24px;
      margin-right: 10px;
      fill: white;
    }

    .result {
      margin-top: 25px;
      word-break: break-all;
      font-size: 14px;
      color: #fff;
    }

    .box {
      background: #111;
      border: 1px solid #00aaff;
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
      font-size: 13px;
      overflow-x: auto;
      text-align: left;
      color: #00aaff;
    }

    a {
      color: #00aaff;
      text-decoration: none;
    }

    button.copyBtn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: #00aaff;
      border: none;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
    
    button.copyBtn:hover {
      background: #0088cc;
    }

    .success {
      margin-top: 10px;
      color: #00ffcc;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="splash">
    <h1>Satured Anti 🔒</h1>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
  </div>

  <div class="container" id="mainContent">
    <h2 style="color: #fff;">Satured Anti 🔒</h2>

    <textarea id="textInput" placeholder="Paste your Lua script here..."></textarea>
    
    <button class="generate-btn" onclick="generate()">Do loadingstring</button>

    <div class="result" id="result"></div>

    <div class="footer-section">
      <p>This code it's protected by Satured Hub</p>
      
      <a href="https://discord.gg/KfY9ZC23R" target="_blank" class="discord-btn">
        <svg viewBox="0 0 127.14 96.36">
          <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.51-51.11-19.32-72.15ZM42.56,65.36c-5.36,0-9.76-4.83-9.76-10.74s4.31-10.74,9.76-10.74c5.49,0,9.85,4.88,9.76,10.74,0,5.91-4.31,10.74-9.76,10.74Zm42,0c-5.36,0-9.76-4.83-9.76-10.74s4.31-10.74,9.76-10.74c5.49,0,9.85,4.88,9.76,10.74,0,5.91-4.31,10.74-9.76,10.74Z"/>
        </svg>
        Join Satured Hub Discord
      </a>
    </div>

  </div>

  <script>
    // Splash screen delay
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
    }, 2600);

    async function generate() {
      const textArea = document.getElementById("textInput");
      const resultDiv = document.getElementById("result");

      let content = textArea.value;

      if (!content) {
        alert("Write your Lua script");
        return;
      }

      resultDiv.innerHTML = "Generating...";

      try {
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content })
        });

        // LÓGICA RESTAURADA EXACTAMENTE COMO LA TENÍAS ANTES
        const data = await response.json();

        if (!response.ok) {
          resultDiv.innerHTML = "❌ Error generating";
          return;
        }

        const rawUrl = data.raw;
        const loadingString = `loadstring(game:HttpGet("${rawUrl}"))()`;

        resultDiv.innerHTML = `
          <div>
            ✅ <b>Loadstring generated!:</b><br>
            <a href="${rawUrl}" target="_blank">${rawUrl}</a>
          </div>

          <div style="margin-top:20px;">
            🔥 <b>LoadingString:</b>
            <div class="box" id="loadingBox">${loadingString}</div>
            <button class="copyBtn" onclick="copyLoading()">COPY</button>
            <div class="success" id="copyMsg"></div>
          </div>
        `;

      } catch (err) {
        resultDiv.innerHTML = "❌ Connection error";
      }
    }

    function copyLoading() {
      const text = document.getElementById("loadingBox").innerText;
      navigator.clipboard.writeText(text);

      const msg = document.getElementById("copyMsg");
      msg.innerText = "✔ Copied to clipboard";
      setTimeout(() => { msg.innerText = ""; }, 2000);
    }
  </script>

</body>
</html>
