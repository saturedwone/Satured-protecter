<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reli-Monitor Pro</title>
    <style>
        :root { --neon: #00ff88; --bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #2a2a2a; padding: 2rem; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; }
        button { background: var(--neon); color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { opacity: 0.8; }
        #logs { margin-top: 20px; width: 100%; max-height: 200px; overflow-y: auto; font-size: 0.8rem; text-align: left; background: #111; padding: 10px; border-radius: 5px; }
        .log-entry { border-bottom: 1px solid #333; padding: 5px 0; color: #aaa; }
        .success { color: var(--neon); }
    </style>
</head>
<body>

    <div class="container">
        <h2>Reli-Monitor 🤖</h2>
        <p style="font-size: 0.7rem; color: #888;">Mantiene tu bot de Replit activo</p>
        
        <input type="text" id="botUrl" placeholder="https://tu-proyecto.replit.app">
        <button onclick="startMonitor()">INICIAR MONITOR</button>

        <div id="logs">
            <div class="log-entry">Esperando URL...</div>
        </div>
    </div>

    <script>
        let intervalId = null;
        const logsDiv = document.getElementById('logs');

        function addLog(msg, isSuccess = false) {
            const now = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            if(isSuccess) entry.classList.add('success');
            entry.innerHTML = `[${now}] ${msg}`;
            logsDiv.prepend(entry);
            
            // Guardar en la "base de datos" local (localStorage)
            const history = JSON.parse(localStorage.getItem('monitor_logs') || '[]');
            history.push({time: now, message: msg});
            localStorage.setItem('monitor_logs', JSON.stringify(history.slice(-50)));
        }

        async function pingBot() {
            const url = document.getElementById('botUrl').value;
            if(!url) return;

            addLog("Enviando ping de actividad...");
            
            try {
                // Simulamos el toque de "cosas random" con un parámetro aleatorio
                const randomParam = `?t=${Math.random()}`;
                await fetch(url + randomParam, { mode: 'no-cors' });
                addLog("¡Bot despertado con éxito!", true);
            } catch (e) {
                addLog("Error en el ping (esto es normal en el navegador)");
            }
        }

        function startMonitor() {
            const url = document.getElementById('botUrl').value;
            if(!url.startsWith('http')) {
                alert("Pon una URL válida de Replit");
                return;
            }

            if(intervalId) clearInterval(intervalId);
            
            addLog("Sistema iniciado. Ciclo: 3.5 min.");
            pingBot();

            // 3.5 minutos = 210,000 milisegundos
            intervalId = setInterval(pingBot, 210000);
        }

        // Cargar historial al abrir
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('monitor_logs') || '[]');
            if(saved.length > 0) addLog("--- Historial recuperado ---");
        }
    </script>
</body>
</html>
